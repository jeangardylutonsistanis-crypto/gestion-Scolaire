{% extends 'home.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="bg-white p-8 rounded-2xl shadow-lg text-center w-96">
    <h2 class="text-2xl font-semibold text-gray-800 mb-4">Déconnexion</h2>
    <p class="text-gray-600 mb-6">Voulez-vous vraiment vous déconnecter ?</p>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-semibold shadow">
        Oui, me déconnecter
      </button>
      <a href="/" class="ml-4 text-gray-600 hover:text-gray-800">Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
