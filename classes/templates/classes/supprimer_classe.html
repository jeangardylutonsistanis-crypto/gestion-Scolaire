{% extends 'home.html' %}
{% block content %}
    <!DOCTYPE html>
    <html>
    <head>
        <title>Supprimer une Classe</title>
    </head>
    <body>
        <h1>Supprimer la Classe</h1>
        <p>Êtes-vous sûr de vouloir supprimer la classe "{{ object.nom }}" ?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Supprimer</button>
        </form>
        <a href="{% url 'liste_classes' %}">Retour à la liste</a>
    </body>
    </html>
{% endblock %}
