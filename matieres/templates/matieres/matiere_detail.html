{% extends 'home.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails de la Matière</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans antialiased">
    <div class="container mx-auto p-6 bg-white shadow-lg rounded-lg mt-10">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Détails de la Matière</h1>
        <p class="text-lg text-gray-700 mb-2"><span class="font-semibold">Nom :</span> {{ matiere.nom }}</p>
         <a href="{% url 'matiere_update' matiere.pk %}" class="px-4 py-2 bg-yellow-500 text-white rounded-lg shadow hover:bg-yellow-600 transition">Modifier</a>
        <a href="{% url 'matiere_list' %}" class="px-4 py-2 bg-gray-500 text-white rounded-lg shadow hover:bg-gray-600 transition">Retour à la Liste</a>
    </div>
</body>
</html>
{% endblock %}
