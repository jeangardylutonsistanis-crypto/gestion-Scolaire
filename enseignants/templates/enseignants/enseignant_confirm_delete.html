{% extends 'home.html' %}
{% block content %}
    <!DOCTYPE html>
    <html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Confirmation de Suppression</title>
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    </head>
    <body class="bg-gray-100 font-sans antialiased">
        <div class="container mx-auto p-6 bg-white shadow-lg rounded-lg mt-10">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Êtes-vous sûr de vouloir supprimer cet enseignant ?</h1>
            <p class="text-lg text-gray-700 mb-2"><span class="font-semibold">Nom :</span> {{ enseignant.nom }}</p>
            <p class="text-lg text-gray-700 mb-4"><span class="font-semibold">Prénom :</span> {{ enseignant.prenom }}</p>
            <form method="post" class="flex space-x-4">
                {% csrf_token %}
                <button type="submit" class="px-4 py-2 bg-red-500 text-white rounded-lg shadow hover:bg-red-600 transition">Supprimer</button>
                <a href="{% url 'enseignant_list' %}" class="px-4 py-2 bg-gray-500 text-white rounded-lg shadow hover:bg-gray-600 transition">Annuler</a>
            </form>
        </div>
    </body>
    </html>
{% endblock %}
